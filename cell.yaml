Device:
  DeviceType: # Placeholder for type (Ideal, Real, Measured)
  CellLocation:
    x: 0 # Replace with actual x coordinate
    y: 0 # Replace with actual y coordinate
  ConductanceProperties:
    maxConductance: 0 # To be dynamically determined or specified
    minConductance: 0 # To be dynamically determined or specified
    avgMaxConductance: 0 # To be dynamically determined or specified
    avgMinConductance: 0 # To be dynamically determined or specified
    conductance: 0 # This will be dynamically updated
    conductancePrev: 0 # This will be dynamically updated
  ReadProperties:
    readVoltage: 0.5
    readPulseWidth: 5e-9
  WriteProperties:
    writeVoltageLTP: 0 # To be specified based on device type
    writeVoltageLTD: 0 # To be specified based on device type
    writePulseWidthLTP: 0 # To be specified based on device type
    writePulseWidthLTD: 0 # To be specified based on device type
    writeEnergy: 0 # This will be dynamically updated
    maxNumLevelLTP: 0 # To be specified based on device type
    maxNumLevelLTD: 0 # To be specified based on device type
    numPulse: 0 # This will be dynamically updated
  DeviceConfiguration:
    cmosAccess: true
    FeFET: false
    gateCapFeFET: 2.1717e-18
    resistanceAccess: 15e3
    nonlinearIV: false
    nonIdenticalPulse: false
    NL: 10
  NonIdenticalPulseSettings:
    VinitLTP: 2.85
    VstepLTP: 0.05
    VinitLTD: 2.1
    VstepLTD: 0.05
    PWinitLTP: 75e-9
    PWstepLTP: 5e-9
    PWinitLTD: 75e-9
    PWstepLTD: 5e-9
    writeVoltageSquareSum: 0 # Dynamic variable
  ReadNoise:
    enabled: false
    sigmaReadNoise: 0 # Adjusted based on device specifics
  ConductanceRangeVariation:
    enabled: false
    maxConductanceVar: 0
    minConductanceVar: 0
  PhysicalDimensions:
    heightInFeatureSize: 4 # Depends on cmosAccess and potentially FeFET
    widthInFeatureSize: 4 # Depends on cmosAccess and potentially FeFET
  DeviceMaterials:
    material: # Placeholder for material specification (Ag:a-Si, etc.)
  NonlinearWrite:
    enabled: false # Adjust according to device
  DeviceVariation:
    NL_LTP: 0 # Specify if nonlinear write is enabled
    NL_LTD: 0 # Specify if nonlinear write is enabled
    sigmaDtoD: 0 # Sigma for device-to-device variation, specify if applicable
    sigmaCtoC: 0 # Sigma for cycle-to-cycle variation, specify if applicable, may depend on memory window
  ConductanceData:
    LTP: [] # Specify LTP conductance values, dynamically updated
    LTD: [] # Specify LTD conductance values, dynamically updated if symLTPandLTD is false
  ConductanceLimits:
    maxConductance: 0 # Calculate based on LTP and LTD data
    minConductance: 0 # Calculate based on LTP and LTD data
    conductance: 0 # Set to initial conductance
    conductancePrev: 0 # Initially the same as conductance

