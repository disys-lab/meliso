    widthInFeatureSize: 4 # Depends on cmosAccess and potentially FeFET
  DeviceMaterials:
    material: EpiRAM_Ag:SiGe # Placeholder for material specification (Ag:a-Si, etc.)
  NonlinearWrite:
    enabled: false # Adjust according to device
  DeviceVariation:
    #meliso_obj.setDeviceVariation(0.5,-0.5,0,0.02)
    NL_LTP: 0.5 # Specify if nonlinear write is enabled
    NL_LTD: -0.5 # Specify if nonlinear write is enabled
    sigmaDtoD: 0 # Sigma for device-to-device variation, specify if applicable
    sigmaCtoC: 0.02 #* (maxConductance - minConductance) # Sigma for cycle-to-cycle variation, specify if applicable, may depend on memory window