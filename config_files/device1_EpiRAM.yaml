Device:
  #meliso_obj.setConductanceProperties(1.2345679012345678e-05, 2.4592986080369874e-07,1.2345679012345678e-05, 2.4592986080369874e-07,2.4592986080369874e-07,2.4592986080369874e-07)
  ConductanceProperties:
    maxConductance: 1.2345679012345678e-05 # To be dynamically determined or specified
    minConductance: 2.4592986080369874e-07 # To be dynamically determined or specified
    avgMaxConductance: maxConductance # To be dynamically determined or specified
    avgMinConductance: minConductance # To be dynamically determined or specified
    conductance: minConductance # This will be dynamically updated
    conductancePrev: conductance # This will be dynamically updated
  ReadProperties:
    readVoltage: 0.5
    readPulseWidth: 5e-9
  #meliso_obj.setWriteProperties(5, -3, 5e-6,5e-6,256,256)
  WriteProperties:
    writeVoltageLTP: 5 # To be specified based on device type
    writeVoltageLTD: -3 # To be specified based on device type
    writePulseWidthLTP: 5e-6 # To be specified based on device type
    writePulseWidthLTD: 5e-6 # To be specified based on device type
    writeEnergy: 0 # This will be dynamically updated
    maxNumLevelLTP: 256 # To be specified based on device type
    maxNumLevelLTD: 256 # To be specified based on device type
    numPulse: 0 # This will be dynamically updated
  DeviceConfiguration:
    cmosAccess: true
    FeFET: false
    gateCapFeFET: 2.1717e-18
    resistanceAccess: 15e3
    nonlinearIV: false
    nonIdenticalPulse: false
    NL: 10
  NonIdenticalPulseSettings:
    VinitLTP: 2.85
    VstepLTP: 0.05
    VinitLTD: 2.1
    VstepLTD: 0.05
